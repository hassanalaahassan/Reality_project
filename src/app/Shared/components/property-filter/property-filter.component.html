<!-- Filter Toggle Button -->
<button class="filter-toggle-btn" (click)="toggle()">
  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
  </svg>
  Filters
  @if (activeFilterCount() > 0) {
    <span class="filter-count">{{ activeFilterCount() }}</span>
  }
</button>

<div class="filter-panel-wrapper" [class.open]="isOpen()">
  <!-- Overlay Backdrop -->
  <div class="filter-backdrop" (click)="close()"></div>

  <!-- Filter Panel (Overlay) -->
  <div class="filter-panel">
    <!-- Panel Header -->
    <div class="panel-header">
      <h3 class="panel-title font-heading">Filter Properties</h3>
      <button class="panel-close" (click)="close()">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="filter-grid">
      <!-- Search -->
      <div class="filter-field span-full">
        <label class="filter-label">Search</label>
        <div class="search-wrapper">
          <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input
            type="text"
            class="filter-input search-input"
            placeholder="Search by title or location..."
            [value]="filters().search"
            (input)="updateFilter('search', $any($event.target).value)"
          />
        </div>
      </div>

      <!-- Status -->
      <div class="filter-field">
        <label class="filter-label">Status</label>
        <select class="filter-input" [value]="filters().status" (change)="updateFilter('status', $any($event.target).value)">
          <option value="">All Status</option>
          <option value="rent">For Rent</option>
          <option value="sale">For Sale</option>
        </select>
      </div>

      <!-- Type -->
      <div class="filter-field">
        <label class="filter-label">Type</label>
        <select class="filter-input" [value]="filters().type" (change)="updateFilter('type', $any($event.target).value)">
          <option value="">All Types</option>
          <option value="apartment">Apartment</option>
          <option value="villa">Villa</option>
          <option value="chalet">Chalet</option>
          <option value="studio">Studio</option>
          <option value="land">Land</option>
          <option value="shop">Shop</option>
        </select>
      </div>

      <!-- Price Min -->
      <div class="filter-field">
        <label class="filter-label">Min Price</label>
        <input type="number" class="filter-input" placeholder="e.g. 500000"
          [value]="filters().priceMin ?? ''"
          (input)="updateNumericFilter('priceMin', $any($event.target).value)"
        />
      </div>

      <!-- Price Max -->
      <div class="filter-field">
        <label class="filter-label">Max Price</label>
        <input type="number" class="filter-input" placeholder="e.g. 5000000"
          [value]="filters().priceMax ?? ''"
          (input)="updateNumericFilter('priceMax', $any($event.target).value)"
        />
      </div>

      <!-- Area Min -->
      <div class="filter-field">
        <label class="filter-label">Min Area (m²)</label>
        <input type="number" class="filter-input" placeholder="e.g. 80"
          [value]="filters().areaMin ?? ''"
          (input)="updateNumericFilter('areaMin', $any($event.target).value)"
        />
      </div>

      <!-- Area Max -->
      <div class="filter-field">
        <label class="filter-label">Max Area (m²)</label>
        <input type="number" class="filter-input" placeholder="e.g. 300"
          [value]="filters().areaMax ?? ''"
          (input)="updateNumericFilter('areaMax', $any($event.target).value)"
        />
      </div>

      <!-- Bedrooms -->
      <div class="filter-field">
        <label class="filter-label">Bedrooms</label>
        <select class="filter-input" [value]="filters().minBeds ?? ''" (change)="updateNumericFilter('minBeds', $any($event.target).value)">
          <option value="">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
          <option value="5">5+</option>
        </select>
      </div>

      <!-- Bathrooms -->
      <div class="filter-field">
        <label class="filter-label">Bathrooms</label>
        <select class="filter-input" [value]="filters().minBaths ?? ''" (change)="updateNumericFilter('minBaths', $any($event.target).value)">
          <option value="">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
        </select>
      </div>
    </div>

    <!-- Footer -->
    <div class="panel-footer">
      <span class="results-count font-body">{{ resultCount() }} properties found</span>
      @if (activeFilterCount() > 0) {
        <button class="clear-btn btn font-heading" (click)="clearFilters()">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
          Clear All
        </button>
      }
    </div>
  </div>
</div>
