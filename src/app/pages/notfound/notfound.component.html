<main class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-realty-cream-50">
  <!-- Decorative background elements -->
  <div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
    <div class="absolute top-10 left-10 w-64 h-64 bg-realty-terracotta-500 rounded-full mix-blend-multiply filter blur-3xl"></div>
    <div class="absolute top-1/2 right-20 w-72 h-72 bg-realty-blue-500 rounded-full mix-blend-multiply filter blur-3xl"></div>
    <div class="absolute bottom-10 left-1/3 w-80 h-80 bg-realty-sage-500 rounded-full mix-blend-multiply filter blur-3xl"></div>
  </div>

  <div class="relative z-10 max-w-lg w-full text-center px-6 py-12 bg-white/60 backdrop-blur-xl rounded-3xl shadow-xl border border-white/40 animate-fade-in group">
    
    <!-- Animated Icon -->
    <div class="mb-8 relative inline-block">
      <!-- House SVG -->
      <svg class="w-24 h-24 mx-auto text-realty-blue-500 relative z-10 transition-transform duration-500 ease-out group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      <!-- "Missing" Sign Overlay -->
      <div class="absolute -bottom-2 -right-4 bg-realty-terracotta-500 text-white font-heading font-bold text-xs uppercase px-3 py-1.5 rounded shadow-lg transform rotate-12 transition-transform duration-500 ease-out group-hover:rotate-6 group-hover:scale-110 z-20">
        404
      </div>
    </div>

    <!-- Typography -->
    <h1 class="text-4xl md:text-5xl font-heading font-bold text-realty-blue-800 mb-4 tracking-tight">
      Wrong Address!
    </h1>
    
    <p class="text-realty-gray-600 mb-2 font-medium text-lg">
      We searched high and low, but this property doesn't exist.
    </p>
    
    <p class="text-realty-gray-500 mb-8 text-sm">
      The page you're looking for might have been sold, removed, or is temporarily out of market.
    </p>

    <!-- Call to Actions -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <button 
        (click)="goBack()" 
        class="btn btn-outline w-full sm:w-auto hover:scale-105"
      >
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 mr-2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Go Back
      </button>

      <a 
        routerLink="/" 
        class="btn btn-primary w-full sm:w-auto hover:scale-105"
      >
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 mr-2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
        Return Home
      </a>
    </div>

  </div>
</main>
