<div class="container mx-auto px-4">
  <!-- Header + Filter -->
  <div class="page-header">
    <h2 class="page-title">Available Properties</h2>
    <app-property-filter
      [properties]="allProperties()"
      (filtered)="onFiltered($event)"
    />
  </div>

  <!-- Properties Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-full">
    @if (isLoading()) {
      @for (item of skeletonArray; track $index) {
        <app-card [isLoading]="true" [property]="null!"/>
      }
    } @else {
      @for (prop of displayedProperties(); track prop.id) {
        <app-card [property]="prop" [isFavorite]="checkPropertyFav(prop.id+'')" [isLoading]="false" (favoriteToggle)="onToggleFavorite($event)"/>
      }

      @if (displayedProperties().length === 0) {
        <div class="col-span-full py-12 text-center">
          <div class="empty-state">
            <svg class="w-20 h-20 mx-auto mb-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <p class="text-xl font-semibold text-gray-600 mb-2">No properties match your filters</p>
            <p class="text-sm text-gray-400">Try adjusting your search criteria</p>
          </div>
        </div>
      }
    }
  </div>
</div>
