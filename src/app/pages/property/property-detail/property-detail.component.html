@if (isLoading()) {
  <!-- ═══ LOADING SKELETON ═══ -->
  <div class="detail-page">
    <div class="detail-container">
      <!-- Back button skeleton -->
      <div
        class="skeleton-bar"
        style="
          width: 120px;
          height: 40px;
          border-radius: 10px;
          margin-bottom: 1.5rem;
        "
      ></div>

      <div class="detail-layout">
        <!-- Image skeleton -->
        <div class="gallery-section">
          <div
            class="skeleton-bar"
            style="width: 100%; height: 420px; border-radius: 20px"
          ></div>
          <div class="thumbnails-row" style="margin-top: 1rem">
            <div class="skeleton-bar" style="width: 80px; height: 60px; border-radius: 10px"></div>
            <div class="skeleton-bar" style="width: 80px; height: 60px; border-radius: 10px"></div>
            <div class="skeleton-bar" style="width: 80px; height: 60px; border-radius: 10px"></div>
          </div>
        </div>

        <!-- Info skeleton -->
        <div class="info-section">
          <div class="skeleton-bar" style="width: 60%; height: 32px; margin-bottom: 1rem"></div>
          <div class="skeleton-bar" style="width: 40%; height: 24px; margin-bottom: 2rem"></div>
          <div class="skeleton-bar" style="width: 50%; height: 36px; margin-bottom: 2rem"></div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
            <div class="skeleton-bar" style="height: 80px; border-radius: 12px"></div>
            <div class="skeleton-bar" style="height: 80px; border-radius: 12px"></div>
            <div class="skeleton-bar" style="height: 80px; border-radius: 12px"></div>
            <div class="skeleton-bar" style="height: 80px; border-radius: 12px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
} @else if (notFound()) {
  <!-- ═══ NOT FOUND ═══ -->
  <div class="detail-page">
    <div class="not-found-state">
      <div class="not-found-icon">🏠</div>
      <h2>Property Not Found</h2>
      <p>The property you're looking for doesn't exist or has been removed.</p>
      <a routerLink="/properties" class="back-home-btn">
        <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Properties
      </a>
    </div>
  </div>
} @else if (property()) {
  <!-- ═══ PROPERTY DETAIL ═══ -->
  <div class="detail-page animate-page-in">
    <div class="detail-container">
      <!-- Back Button -->
      <a routerLink="/properties" class="back-btn">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back
      </a>

      <div class="detail-layout">
        <!-- ═══ LEFT: Gallery ═══ -->
        <div class="gallery-section">
          <app-image-gallery
            [images]="property()?.image_urls || []"
            [title]="property()?.title || ''"
            [isVip]="property()?.isVip || false"
            [statusLabel]="getStatusLabel(property()?.status)"
            [statusColor]="getStatusColor(property()?.status)"
            [isFavorite]="isFavorite()"
            (toggleFavoriteEvent)="toggleFavorite()"
          ></app-image-gallery>

          <!-- Desktop Map Box -->
          @if (property()?.latitude && property()?.longitude) {
            <app-property-map-box
              [latitude]="property()!.latitude!"
              [longitude]="property()!.longitude!"
              [height]="mapHeight()"
              [zoom]="15"
            ></app-property-map-box>
          }
        </div>

        <!-- ═══ RIGHT: Info ═══ -->
        <app-property-info
          [title]="property()?.title || ''"
          [location]="property()?.location || ''"
          [price]="property()?.price || null"
          [isNegotiable]="property()?.isNegotiable || false"
          [area]="property()?.area || ''"
          [beds]="property()?.beds ?? null"
          [bathroom]="property()?.bathroom ?? null"
          [floor]="property()?.floor ?? null"
          [description]="property()?.description || ''"
          [features]="property()?.features || []"
          [ownerName]="property()?.ownerName || ''"
          [ownerPhone]="property()?.ownerPhone || ''"
          [userId]="property()?.user_id || 'no'"
          [id]="property()?.id+'' || ''"
          (deleteClick)="openDeleteModal()"
        ></app-property-info>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <app-confirmation-modal
    [isOpen]="isDeleteModalOpen()"
    title="Delete Property"
    message="Are you sure you want to delete this property? This action cannot be undone."
    confirmText="Delete"
    cancelText="Keep Property"
    confirmColorClass="bg-red-600 hover:bg-red-700 text-white"
    (confirm)="deleteProperty()"
    (cancel)="closeDeleteModal()"
  ></app-confirmation-modal>
}
