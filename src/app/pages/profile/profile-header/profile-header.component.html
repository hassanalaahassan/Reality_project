<div class="profile-header">
  <div class="avatar-container" (click)="fileInput.click()">
    <img
      [src]="imageUrl || 'https://api.dicebear.com/7.x/avataaars/svg?seed=Agent'"
      alt="Profile Avatar"
      class="avatar-image"
    />
    <div class="avatar-overlay">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span class="text-xs mt-1">Change</span>
    </div>
    @if (isUploading) {
      <div class="uploading-spinner">
        <div class="spinner"></div>
      </div>
    }
    <input #fileInput type="file" accept="image/*" class="hidden" (change)="onAvatarSelect($event)" />
  </div>

  <div class="header-info">
    <h1 class="user-name">{{ fullName || 'User' }}</h1>
    <p class="user-email">{{ email }}</p>
    <span class="role-badge" [class.agent]="isAgent">
      {{ isAgent ? '🏢 Agent' : '👤 User' }}
    </span>
  </div>
</div>
